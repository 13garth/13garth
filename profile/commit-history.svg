<svg width="760" height="260" viewBox="0 0 760 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Commit History</title>
<desc id="desc">Unique profile repository commits grouped by year; branch-aware when SCAN_ALL_BRANCHES is enabled.</desc>

<defs>
  <linearGradient id="accent" x1="0" x2="760" y1="0" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#ff5a5f" />
    <stop offset="0.34" stop-color="#f59e0b" />
    <stop offset="0.67" stop-color="#34d399" />
    <stop offset="1" stop-color="#38bdf8" />
  </linearGradient>
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
    <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1e293b" stroke-width="0.7" opacity="0.55" />
  </pattern>
</defs>

<style>
  .bg { fill: #0b1020; }
  .card { fill: #0f172a; stroke: #263244; stroke-width: 1; }
  .panel { fill: #111827; stroke: #243047; stroke-width: 1; }
  .title { fill: #f5f7fb; font: 800 24px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .subtitle { fill: #9ca8ba; font: 500 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .label { fill: #cbd5e1; font: 700 14px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .small { fill: #9ca8ba; font: 500 12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .value { fill: #f5f7fb; font: 800 27px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .axis { fill: #cbd5e1; font: 700 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
</style>
<rect class="bg" width="760" height="260" rx="16" />
<rect width="760" height="260" fill="url(#grid)" rx="16" />
<rect class="card" x="0.5" y="0.5" width="759" height="259" rx="16" />
<rect x="0" y="0" width="760" height="5" fill="url(#accent)" />
<text x="28" y="42" class="title">Commit History</text>
<text x="28" y="64" class="subtitle">Unique profile repository commits grouped by year; branch-aware when SCAN_ALL_BRANCHES is enabled.</text>
<text x="34" y="104" class="axis">2025</text><rect x="126" y="94" width="500" height="12" fill="#1f2937" rx="6" /><rect x="126" y="94" width="500" height="12" fill="#ff5a5f" rx="6" /><text x="710" y="104" class="axis" text-anchor="end">29</text><text x="34" y="135" class="axis">2024</text><rect x="126" y="125" width="500" height="12" fill="#1f2937" rx="6" /><rect x="126" y="125" width="69" height="12" fill="#f59e0b" rx="6" /><text x="710" y="135" class="axis" text-anchor="end">4</text><text x="34" y="166" class="axis">2020</text><rect x="126" y="156" width="500" height="12" fill="#1f2937" rx="6" /><rect x="126" y="156" width="103" height="12" fill="#34d399" rx="6" /><text x="710" y="166" class="axis" text-anchor="end">6</text><text x="34" y="197" class="axis">2019</text><rect x="126" y="187" width="500" height="12" fill="#1f2937" rx="6" /><rect x="126" y="187" width="17" height="12" fill="#38bdf8" rx="6" /><text x="710" y="197" class="axis" text-anchor="end">1</text>
</svg>
