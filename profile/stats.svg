<svg width="760" height="232" viewBox="0 0 760 232" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">GitHub Activity</title>
<desc id="desc">Aggregate activity across profile repositories only. Organizations are not scanned.</desc>

<defs>
  <linearGradient id="accent" x1="0" x2="760" y1="0" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#ff5a5f" />
    <stop offset="0.34" stop-color="#f59e0b" />
    <stop offset="0.67" stop-color="#34d399" />
    <stop offset="1" stop-color="#38bdf8" />
  </linearGradient>
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
    <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1e293b" stroke-width="0.7" opacity="0.55" />
  </pattern>
</defs>

<style>
  .bg { fill: #0b1020; }
  .card { fill: #0f172a; stroke: #263244; stroke-width: 1; }
  .panel { fill: #111827; stroke: #243047; stroke-width: 1; }
  .title { fill: #f5f7fb; font: 800 24px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .subtitle { fill: #9ca8ba; font: 500 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .label { fill: #cbd5e1; font: 700 14px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .small { fill: #9ca8ba; font: 500 12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .value { fill: #f5f7fb; font: 800 27px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
  .axis { fill: #cbd5e1; font: 700 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
</style>
<rect class="bg" width="760" height="232" rx="16" />
<rect width="760" height="232" fill="url(#grid)" rx="16" />
<rect class="card" x="0.5" y="0.5" width="759" height="231" rx="16" />
<rect x="0" y="0" width="760" height="5" fill="url(#accent)" />
<text x="28" y="42" class="title">GitHub Activity</text>
<text x="28" y="64" class="subtitle">Aggregate activity across profile repositories only. Organizations are not scanned.</text>
<rect class="panel" x="28" y="92" width="166" height="78" rx="12" /><circle cx="48" cy="115" r="5" fill="#ff5a5f" /><text x="62" y="120" class="label">Commits</text><text x="48" y="153" class="value">815</text><rect class="panel" x="210" y="92" width="166" height="78" rx="12" /><circle cx="230" cy="115" r="5" fill="#38bdf8" /><text x="244" y="120" class="label">Profile repos</text><text x="230" y="153" class="value">39</text><rect class="panel" x="392" y="92" width="166" height="78" rx="12" /><circle cx="412" cy="115" r="5" fill="#f59e0b" /><text x="426" y="120" class="label">Private repos</text><text x="412" y="153" class="value">32</text><rect class="panel" x="574" y="92" width="158" height="78" rx="12" /><circle cx="594" cy="115" r="5" fill="#34d399" /><text x="608" y="120" class="label">Active years</text><text x="594" y="153" class="value">8</text><text x="28" y="204" class="small">13garth profile repositories only | forks hidden | branch scan on | personal token scan</text>
</svg>
